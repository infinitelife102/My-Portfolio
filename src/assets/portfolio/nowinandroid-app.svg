<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="niaDarkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="niaCard1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4a0"/>
      <stop offset="100%" style="stop-color:#1a9b6b"/>
    </linearGradient>
    <linearGradient id="niaCard2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3DDC84"/>
      <stop offset="100%" style="stop-color:#2ab86b"/>
    </linearGradient>
    <linearGradient id="niaCard3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(61,220,132,0.9)"/>
      <stop offset="100%" style="stop-color:rgba(30,140,82,0.85)"/>
    </linearGradient>
    <filter id="niaCardShadow" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="niaGlowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#niaDarkBg)"/>
  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Floating cards - no phone -->
  <g filter="url(#niaCardShadow)">
    <rect x="120" y="140" width="220" height="140" rx="16" fill="url(#niaCard1)" opacity="0.95" transform="rotate(-4 230 210)"/>
    <rect x="460" y="120" width="240" height="160" rx="20" fill="url(#niaCard2)" opacity="0.92" transform="rotate(3 580 200)"/>
    <rect x="280" y="320" width="260" height="120" rx="18" fill="url(#niaCard3)" opacity="0.9" transform="rotate(-2 410 380)"/>
  </g>
  <!-- Accent lines on cards -->
  <rect x="140" y="175" width="120" height="6" rx="3" fill="rgba(255,255,255,0.35)" transform="rotate(-4 200 178)"/>
  <rect x="140" y="200" width="80" height="5" rx="2" fill="rgba(255,255,255,0.2)" transform="rotate(-4 180 202)"/>
  <rect x="485" y="165" width="140" height="6" rx="3" fill="rgba(255,255,255,0.3)" transform="rotate(3 555 168)"/>
  <rect x="485" y="195" width="100" height="5" rx="2" fill="rgba(255,255,255,0.18)" transform="rotate(3 535 197)"/>
  <rect x="305" y="365" width="160" height="6" rx="3" fill="rgba(255,255,255,0.28)" transform="rotate(-2 385 368)"/>
  <!-- Title -->
  <text x="400" y="520" text-anchor="middle" fill="#e6edf3" font-family="system-ui,sans-serif" font-size="28" font-weight="700">Now in Android</text>
  <text x="400" y="552" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="14">Kotlin · Jetpack Compose</text>
</svg>
